<script>
// ╔════════════════════════════════════════════════════════════════════╗
// ║  📦 DATA STRUCTURES — Linked List Queue (O(1) Enqueue/Dequeue)  ║
// ╚════════════════════════════════════════════════════════════════════╝

class QueueNode {
    constructor(data) {
        this.data = data;
        this.next = null;
    }
}

class LinkedListQueue {
    constructor() {
        this.head = null;
        this.tail = null;
        this.size = 0;
    }
    enqueue(data) {
        const node = new QueueNode(data);
        if (!this.tail) {
            this.head = this.tail = node;
        } else {
            this.tail.next = node;
            this.tail = node;
        }
        this.size++;
        return data;
    }
    dequeue() {
        if (!this.head) return null;
        const data = this.head.data;
        this.head = this.head.next;
        if (!this.head) this.tail = null;
        this.size--;
        return data;
    }
    peek() {
        return this.head ? this.head.data : null;
    }
    isEmpty() {
        return this.size === 0;
    }
    toArray() {
        const arr = [];
        let cur = this.head;
        while (cur) { arr.push(cur.data); cur = cur.next; }
        return arr;
    }
}

// ╔════════════════════════════════════════════════════════════════════╗
// ║  📋 CONSTANTS                                                    ║
// ╚════════════════════════════════════════════════════════════════════╝

const SERVICE_TYPES = [
    { prefix: 'R', name: 'แจ้งความร้องทุกข์',   short: 'แจ้งความ',  desc: 'ร้องทุกข์ / แจ้งเอกสารหาย / แจ้งเหตุทั่วไป', icon: '📋',
      bg: 'bg-blue-600',    hover: 'hover:bg-blue-700',    text: 'text-blue-400',    border: 'border-blue-500/30',    light: 'bg-blue-500/10',    ring: 'ring-blue-500',    dot: 'bg-blue-500' },
    { prefix: 'S', name: 'พบพนักงานสอบสวน',     short: 'สอบสวน',    desc: 'สอบปากคำ / ให้การเพิ่มเติม / ติดตามคดี', icon: '🔍',
      bg: 'bg-violet-600',  hover: 'hover:bg-violet-700',  text: 'text-violet-400',  border: 'border-violet-500/30',  light: 'bg-violet-500/10',  ring: 'ring-violet-500',  dot: 'bg-violet-500' },
    { prefix: 'E', name: 'เหตุด่วน / อุบัติเหตุ', short: 'เหตุด่วน',  desc: 'แจ้งเหตุฉุกเฉิน / อุบัติเหตุ', icon: '🚨',
      bg: 'bg-rose-600',    hover: 'hover:bg-rose-700',    text: 'text-rose-400',    border: 'border-rose-500/30',    light: 'bg-rose-500/10',    ring: 'ring-rose-500',    dot: 'bg-rose-500' },
    { prefix: 'L', name: 'ปรึกษากฎหมาย',        short: 'กฎหมาย',    desc: 'สอบถามข้อกฎหมาย / ขอคำปรึกษาเบื้องต้น', icon: '⚖️',
      bg: 'bg-emerald-600', hover: 'hover:bg-emerald-700', text: 'text-emerald-400', border: 'border-emerald-500/30', light: 'bg-emerald-500/10', ring: 'ring-emerald-500', dot: 'bg-emerald-500' },
];

const SVC_MAP = {};
SERVICE_TYPES.forEach(s => SVC_MAP[s.prefix] = s);

// ╔════════════════════════════════════════════════════════════════════╗
// ║  🌐 GLOBAL STATE — Single Source of Truth                        ║
// ╚════════════════════════════════════════════════════════════════════╝

const State = {
    // 2D Queue Matrix: queues[serviceType][priority] = LinkedListQueue
    // Priority 0 = VIP, Priority 1 = Normal
    queues: {
        R: { 0: new LinkedListQueue(), 1: new LinkedListQueue() },
        S: { 0: new LinkedListQueue(), 1: new LinkedListQueue() },
        E: { 0: new LinkedListQueue(), 1: new LinkedListQueue() },
        L: { 0: new LinkedListQueue(), 1: new LinkedListQueue() },
    },
    // Running sequence numbers: seq[serviceType][priority]
    seq: {
        R: { 0: 0, 1: 0 },  S: { 0: 0, 1: 0 },
        E: { 0: 0, 1: 0 },  L: { 0: 0, 1: 0 },
    },
    // Counter (service point) states
    counters: [
        { id: 1, serviceType: 'R', status: 'idle', current: null, calledAt: null, startedAt: null },
        { id: 2, serviceType: 'S', status: 'idle', current: null, calledAt: null, startedAt: null },
        { id: 3, serviceType: 'E', status: 'idle', current: null, calledAt: null, startedAt: null },
        { id: 4, serviceType: 'L', status: 'idle', current: null, calledAt: null, startedAt: null },
    ],
    nextCounterId: 5,
    // Display board
    lastCalled: null,
    lastCalledTime: 0,
    flashActive: false,
    // Stats
    totalIssued: 0,
    totalServed: 0,
};

const Kiosk = {
    step: 0,        // 0=main, 1=slip(auto-return), 2=vip-select
    selectedService: null,
    selectedPriority: null,
    lastIssued: null,
    autoReturnTimer: null,
};

// ╔════════════════════════════════════════════════════════════════════╗
// ║  🎯 BUSINESS LOGIC                                               ║
// ╚════════════════════════════════════════════════════════════════════╝

function formatQueueNumber(prefix, priority, num) {
    const n = String(num).padStart(3, '0');
    return priority === 0 ? `${prefix}-V${n}` : `${prefix}-${n}`;
}

function enqueue(serviceType, priority) {
    State.seq[serviceType][priority]++;
    const num = State.seq[serviceType][priority];
    const queueNumber = formatQueueNumber(serviceType, priority, num);
    const ticket = {
        id: `${serviceType}-${priority}-${num}`,
        queueNumber,
        serviceType,
        priority,
        status: 'pending',
        createdAt: Date.now(),
    };
    State.queues[serviceType][priority].enqueue(ticket);
    State.totalIssued++;
    return ticket;
}

function dequeueNext(serviceType) {
    // Strict Priority: VIP (0) first, then Normal (1). FIFO within each.
    if (!State.queues[serviceType][0].isEmpty()) {
        return State.queues[serviceType][0].dequeue();
    }
    if (!State.queues[serviceType][1].isEmpty()) {
        return State.queues[serviceType][1].dequeue();
    }
    return null;
}

function getWaitingCount(serviceType) {
    return State.queues[serviceType][0].size + State.queues[serviceType][1].size;
}

function getWaitingAhead(serviceType, priority) {
    if (priority === 0) {
        return State.queues[serviceType][0].size - 1;
    }
    return State.queues[serviceType][0].size + State.queues[serviceType][1].size - 1;
}

function callNext(counterId) {
    const counter = State.counters.find(c => c.id === counterId);
    if (!counter || counter.status !== 'idle') return false;
    const ticket = dequeueNext(counter.serviceType);
    if (!ticket) return false;
    ticket.status = 'called';
    counter.status = 'called';
    counter.current = ticket;
    counter.calledAt = Date.now();
    counter.startedAt = null;
    // Display board flash
    State.lastCalled = { queueNumber: ticket.queueNumber, counterId: counter.id, serviceType: ticket.serviceType, priority: ticket.priority };
    State.lastCalledTime = Date.now();
    State.flashActive = true;
    setTimeout(() => { State.flashActive = false; renderDisplayBoard(); }, 6000);
    playDingDong();
    announceQueue(ticket.queueNumber, counter.id);
    renderAll();
    return true;
}

function startService(counterId) {
    const counter = State.counters.find(c => c.id === counterId);
    if (!counter || counter.status !== 'called') return;
    counter.status = 'processing';
    counter.startedAt = Date.now();
    if (counter.current) counter.current.status = 'processing';
    renderAll();
}

function completeService(counterId) {
    const counter = State.counters.find(c => c.id === counterId);
    if (!counter || counter.status !== 'processing') return;
    if (counter.current) counter.current.status = 'completed';
    counter.status = 'idle';
    counter.current = null;
    counter.calledAt = null;
    counter.startedAt = null;
    State.totalServed++;
    renderAll();
}

// ─── Transfer Queue ────────────────────────────────────────────────

function transferQueue(counterId, targetServiceType) {
    const counter = State.counters.find(c => c.id === counterId);
    if (!counter || (counter.status !== 'called' && counter.status !== 'processing')) return;
    if (!counter.current) return;

    // ห้ามย้ายมาหาตัวเอง: ถ้าเป็นประเภทเดิม ต้องมีช่องอื่นที่รับประเภทนี้
    const isSameType = counter.current.serviceType === targetServiceType;
    if (isSameType) {
        const otherCounters = State.counters.filter(c => c.serviceType === targetServiceType && c.id !== counterId);
        if (otherCounters.length === 0) return; // ไม่มีช่องอื่นให้ย้ายไป
    }

    const ticket = counter.current;
    const priority = ticket.priority;

    // ใช้เลขคิวเดิม — ประชาชนถือบัตรคิวเดิมอยู่แล้ว ไม่ต้องออกเลขใหม่
    const newTicket = {
        id: `${targetServiceType}-${priority}-${ticket.queueNumber}`,
        queueNumber: ticket.queueNumber,
        serviceType: targetServiceType,
        priority: priority,
        status: 'pending',
        createdAt: ticket.createdAt,
        transferredFrom: ticket.queueNumber,
    };

    State.queues[targetServiceType][priority].enqueue(newTicket);

    // Reset counter
    counter.status = 'idle';
    counter.current = null;
    counter.calledAt = null;
    counter.startedAt = null;

    closeTransferModal();
    renderAll();
}

function openTransferModal(counterId) {
    const counter = State.counters.find(c => c.id === counterId);
    if (!counter || !counter.current) return;
    const currentType = counter.current.serviceType;
    const modal = document.getElementById('transfer-modal');
    const body = document.getElementById('transfer-modal-body');

    const options = SERVICE_TYPES.map(st => {
        const isSameType = st.prefix === currentType;
        // ถ้าเป็นประเภทเดิม ต้องมีช่องอื่นรับประเภทนี้ ไม่งั้นย้ายมาหาตัวเองอย่างเดียว
        const otherCountersCount = State.counters.filter(c => c.serviceType === st.prefix && c.id !== counterId).length;
        const disabled = isSameType && otherCountersCount === 0;
        return `
        <button onclick="${disabled ? '' : `transferQueue(${counterId}, '${st.prefix}')`}"
            class="w-full p-3 rounded-xl border ${disabled ? 'border-slate-700/30 bg-slate-800/30 opacity-40 cursor-not-allowed' : isSameType ? 'border-amber-500/40 bg-amber-500/10 hover:bg-amber-500/20' : 'border-slate-600 bg-slate-700/50 hover:bg-slate-700'} active:scale-[0.97]
                   transition-all duration-200 text-left flex items-center gap-3" ${disabled ? 'disabled' : ''}>
            <span class="text-2xl">${st.icon}</span>
            <div>
                <div class="font-bold text-sm text-white">${st.name} ${isSameType ? '<span class="text-[10px] text-amber-400 font-normal">(ประเภทเดิม)</span>' : ''}</div>
                <div class="text-[11px] text-slate-400">รอ: ${getWaitingCount(st.prefix)} คิว${disabled ? ' · <span class="text-rose-400">ไม่มีช่องอื่น</span>' : ''}</div>
            </div>
        </button>`;
    }).join('');

    body.innerHTML = `
        <div class="text-center mb-3">
            <div class="text-amber-400 text-2xl mb-1">🔀</div>
            <div class="text-white font-bold text-sm">ย้ายคิว ${counter.current.queueNumber}</div>
            <div class="text-slate-400 text-xs">จาก ${SVC_MAP[currentType].name} ไปยัง:</div>
        </div>
        <div class="flex flex-col gap-2">${options}</div>
    `;

    modal.classList.remove('hidden');
}

function closeTransferModal() {
    document.getElementById('transfer-modal').classList.add('hidden');
}

// ─── Counter Management ────────────────────────────────────────────

function addCounter(serviceType) {
    const id = State.nextCounterId++;
    State.counters.push({ id, serviceType, status: 'idle', current: null, calledAt: null, startedAt: null });
    renderAll();
}

function canRemoveCounter(counterId) {
    const counter = State.counters.find(c => c.id === counterId);
    if (!counter || counter.status !== 'idle') return false;
    return State.counters.filter(c => c.serviceType === counter.serviceType).length > 1;
}

function removeCounter(counterId) {
    if (!canRemoveCounter(counterId)) return;
    State.counters = State.counters.filter(c => c.id !== counterId);
    renderAll();
}

// ╔════════════════════════════════════════════════════════════════════╗
// ║  🔊 AUDIO — Notification & TTS                                   ║
// ╚════════════════════════════════════════════════════════════════════╝

let audioCtx = null;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playDingDong() {
    try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;
        // Ding
        const o1 = ctx.createOscillator(), g1 = ctx.createGain();
        o1.connect(g1); g1.connect(ctx.destination);
        o1.type = 'sine'; o1.frequency.value = 830;
        g1.gain.setValueAtTime(0.25, now);
        g1.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        o1.start(now); o1.stop(now + 0.5);
        // Dong
        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = 'sine'; o2.frequency.value = 622;
        g2.gain.setValueAtTime(0.25, now + 0.35);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
        o2.start(now + 0.35); o2.stop(now + 0.9);
    } catch(e) {}
}

function announceQueue(queueNumber, counterId) {
    try {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(`หมายเลข ${queueNumber.split('').join(' ')} เชิญที่ช่องบริการ ${counterId}`);
        msg.lang = 'th-TH';
        msg.rate = 0.85;
        msg.pitch = 1;
        setTimeout(() => window.speechSynthesis.speak(msg), 1000);
    } catch(e) {}
}

function playTicketSound() {
    try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = 1200;
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.start(now); o.stop(now + 0.15);
    } catch(e) {}
}

// ╔════════════════════════════════════════════════════════════════════╗

function kioskSelectService(prefix) {
    const ticket = enqueue(prefix, 1);
    Kiosk.selectedService = prefix;
    Kiosk.selectedPriority = 1;
    Kiosk.lastIssued = ticket;
    Kiosk.step = 1;
    playTicketSound();
    renderAll();
    scheduleAutoReturn();
}

function kioskShowVip() {
    Kiosk.step = 2;
    renderKiosk();
}

function kioskVipSelect(prefix) {
    const ticket = enqueue(prefix, 0);
    Kiosk.selectedService = prefix;
    Kiosk.selectedPriority = 0;
    Kiosk.lastIssued = ticket;
    Kiosk.step = 1;
    playTicketSound();
    renderAll();
    scheduleAutoReturn();
}

function scheduleAutoReturn() {
    if (Kiosk.autoReturnTimer) clearTimeout(Kiosk.autoReturnTimer);
    Kiosk.autoReturnTimer = setTimeout(() => {
        kioskReset();
        renderAll();
    }, 3000);
}

function kioskBack() {
    if (Kiosk.autoReturnTimer) clearTimeout(Kiosk.autoReturnTimer);
    Kiosk.step = 0;
    Kiosk.selectedService = null;
    renderKiosk();
}

function kioskReset() {
    if (Kiosk.autoReturnTimer) clearTimeout(Kiosk.autoReturnTimer);
    Kiosk.autoReturnTimer = null;
    Kiosk.step = 0;
    Kiosk.selectedService = null;
    Kiosk.selectedPriority = null;
    Kiosk.lastIssued = null;
    renderKiosk();
}

        const st = SVC_MAP[c.serviceType];

// ─── Officer Area ──────────────────────────────────────────────────

let dragState = { fromId: null };

function handleDragStart(e, counterId) {
    dragState.fromId = counterId;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', counterId);
    requestAnimationFrame(() => e.target.closest('[data-counter-id]')?.classList.add('dragging'));
}

function handleDragEnd(e) {
    dragState.fromId = null;
    document.querySelectorAll('.dragging, .drag-over-top, .drag-over-bottom').forEach(el => {
        el.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
    });
}

function handleDragOver(e, counterId) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragState.fromId == counterId) return;
    const card = e.target.closest('[data-counter-id]');
    if (!card) return;
    document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => {
        el.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    const rect = card.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    card.classList.toggle('drag-over-top', e.clientY < midY);
    card.classList.toggle('drag-over-bottom', e.clientY >= midY);
}

function handleDragLeave(e) {
    const card = e.target.closest('[data-counter-id]');
    if (card && !card.contains(e.relatedTarget)) {
        card.classList.remove('drag-over-top', 'drag-over-bottom');
    }
}

function handleDrop(e, toId) {
    e.preventDefault();
    const fromId = dragState.fromId;
    if (fromId == null || fromId == toId) return;
    const fromIdx = State.counters.findIndex(c => c.id == fromId);
    const toIdx = State.counters.findIndex(c => c.id == toId);
    if (fromIdx < 0 || toIdx < 0) return;
    const card = e.target.closest('[data-counter-id]');
    const rect = card?.getBoundingClientRect();
    const insertAfter = rect && e.clientY >= rect.top + rect.height / 2;
    const [moved] = State.counters.splice(fromIdx, 1);
    let newIdx = State.counters.findIndex(c => c.id == toId);
    if (insertAfter) newIdx++;
    State.counters.splice(newIdx, 0, moved);
    dragState.fromId = null;
    renderAll();
}

function renderOfficerArea() {
    const el = document.getElementById('officer-area');

    const addBar = `
        <div class="flex items-center gap-1.5 p-2 bg-slate-800/40 rounded-xl border border-dashed border-slate-700/40 shrink-0">
            <span class="text-slate-500 text-[10px] shrink-0 mr-1">+ เพิ่มช่อง:</span>
            ${SERVICE_TYPES.map(st => `
                <button onclick="addCounter('${st.prefix}')" class="flex-1 py-1.5 rounded-lg ${st.light} ${st.text} hover:opacity-80 active:scale-95 text-[11px] font-semibold transition-all flex items-center justify-center gap-1" title="เพิ่มช่อง ${st.short}">
                    + ${st.short}
                </button>
            `).join('')}
        </div>`;

    const cards = State.counters.map(c => {
        const st = SVC_MAP[c.serviceType];
        const waiting = getWaitingCount(c.serviceType);
        const qn = c.current ? c.current.queueNumber : null;
        const isVip = c.current?.priority === 0;
        const removable = canRemoveCounter(c.id);

        let statusBadge, statusBg;
        if (c.status === 'idle') { statusBadge = `<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-slate-700 text-slate-400">ว่าง</span>`; statusBg = 'border-slate-700/50'; }
        else if (c.status === 'called') { statusBadge = `<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-amber-500/20 text-amber-400 animate-pulse">กำลังเรียก</span>`; statusBg = 'border-amber-500/30'; }
        else { statusBadge = `<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-emerald-500/20 text-emerald-400">กำลังให้บริการ</span>`; statusBg = 'border-emerald-500/30'; }

        let elapsed = '';
        if (c.status === 'processing' && c.startedAt) {
            const sec = Math.floor((Date.now() - c.startedAt) / 1000);
            const m = Math.floor(sec / 60), s = sec % 60;
            elapsed = `<span class="text-slate-500 text-[10px] tabular-nums" id="elapsed-${c.id}">${m}:${String(s).padStart(2,'0')}</span>`;
        }

        let actionBtn = '';
        if (c.status === 'idle') {
            if (waiting > 0) {
                actionBtn = `<button onclick="callNext(${c.id})" class="w-full py-2 rounded-lg bg-blue-600 hover:bg-blue-700 active:scale-[0.97] text-white font-semibold text-xs shadow-lg shadow-blue-600/20 transition-all duration-200 flex items-center justify-center gap-1.5">
                    <span>📢</span> เรียกคิวถัดไป</button>`;
            } else {
                actionBtn = `<button disabled class="w-full py-2 rounded-lg bg-slate-700/50 text-slate-500 font-semibold text-xs cursor-not-allowed flex items-center justify-center gap-1.5">
                    <span>📢</span> ไม่มีคิวรอ</button>`;
            }
        } else if (c.status === 'called') {
            actionBtn = `<div class="flex gap-1.5">
                <button onclick="startService(${c.id})" class="flex-1 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 active:scale-[0.97] text-white font-semibold text-xs shadow-lg shadow-emerald-600/20 transition-all duration-200 flex items-center justify-center gap-1.5">
                    <span>▶️</span> เริ่มบริการ</button>
                <button onclick="openTransferModal(${c.id})" class="py-2 px-2.5 rounded-lg bg-amber-600 hover:bg-amber-700 active:scale-[0.97] text-white font-semibold text-xs shadow-lg shadow-amber-600/20 transition-all duration-200 flex items-center justify-center gap-1" title="ย้ายคิว">
                    🔀</button>
            </div>`;
        } else {
            actionBtn = `<div class="flex gap-1.5">
                <button onclick="completeService(${c.id})" class="flex-1 py-2 rounded-lg bg-rose-600 hover:bg-rose-700 active:scale-[0.97] text-white font-semibold text-xs shadow-lg shadow-rose-600/20 transition-all duration-200 flex items-center justify-center gap-1.5">
                    <span>✅</span> เสร็จสิ้น</button>
                <button onclick="openTransferModal(${c.id})" class="py-2 px-2.5 rounded-lg bg-amber-600 hover:bg-amber-700 active:scale-[0.97] text-white font-semibold text-xs shadow-lg shadow-amber-600/20 transition-all duration-200 flex items-center justify-center gap-1" title="ย้ายคิว">
                    🔀</button>
            </div>`;
        }

        return `
            <div class="bg-slate-800/60 backdrop-blur-sm rounded-xl p-2.5 border ${statusBg} transition-all duration-200 flex flex-col shrink-0"
                 data-counter-id="${c.id}" draggable="true"
                 ondragstart="handleDragStart(event,${c.id})"
                 ondragend="handleDragEnd(event)"
                 ondragover="handleDragOver(event,${c.id})"
                 ondragleave="handleDragLeave(event)"
                 ondrop="handleDrop(event,${c.id})">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2 min-w-0">
                        <span class="w-6 h-6 rounded-lg ${st.light} flex items-center justify-center text-xs shrink-0 drag-handle" title="ลากเพื่อจัดเรียง">⠿</span>
                        <div class="min-w-0">
                            <div class="text-white text-xs font-bold leading-tight">ช่อง ${c.id} <span class="${st.text} font-normal">${st.short}</span></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0">
                        ${elapsed}
                        ${statusBadge}
                        ${removable ? `<button onclick="removeCounter(${c.id})" class="w-5 h-5 rounded flex items-center justify-center text-slate-600 hover:text-rose-400 hover:bg-rose-500/10 transition-all text-[10px]" title="ลบช่องนี้">✕</button>` : ''}
                    </div>
                </div>
                <div class="flex items-center justify-between mb-1.5">
                    <div class="flex items-center gap-2 flex-1 min-w-0">
                        ${qn ? `
                            <div class="text-lg font-extrabold tracking-wide ${isVip ? 'text-amber-400' : 'text-white'} leading-none">${qn}</div>
                            ${isVip ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-400 font-semibold shrink-0">VIP</span>' : ''}
                        ` : `<div class="text-lg font-bold text-slate-600 leading-none">—</div>`}
                    </div>
                    <div class="text-right shrink-0">
                        <span class="text-slate-400 text-[10px]">คิวรอ: </span>
                        <span class="text-white text-xs font-bold">${waiting}</span>
                    </div>
                </div>
                ${actionBtn}
            </div>`;
    }).join('');

    el.innerHTML = addBar + cards;
}

// ─── Header Stats ──────────────────────────────────────────────────

function renderHeaderStats() {
    const el = document.getElementById('header-stats');
    const totalWait = SERVICE_TYPES.reduce((s, st) => s + getWaitingCount(st.prefix), 0);
    el.textContent = `ออกคิว: ${State.totalIssued} | ให้บริการแล้ว: ${State.totalServed} | รอ: ${totalWait}`;
}

// ╔════════════════════════════════════════════════════════════════════╗
// ║  ⏰ CLOCK & ELAPSED TIMERS                                       ║
// ╚════════════════════════════════════════════════════════════════════╝

function updateClock() {
    const now = new Date();
    const timeEl = document.getElementById('board-time');
    const dateEl = document.getElementById('board-date');
    if (timeEl) timeEl.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    if (dateEl) {
        const thaiYear = now.getFullYear() + 543;
        const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
        dateEl.textContent = `${now.getDate()} ${months[now.getMonth()]} ${thaiYear}`;
    }
}

function updateElapsedTimers() {
    State.counters.forEach(c => {
        if (c.status === 'processing' && c.startedAt) {
            const sec = Math.floor((Date.now() - c.startedAt) / 1000);
            const m = Math.floor(sec / 60), s = sec % 60;
            const el = document.getElementById(`elapsed-${c.id}`);
            if (el) el.textContent = `${m}:${String(s).padStart(2, '0')}`;
        }
    });
}

// ╔════════════════════════════════════════════════════════════════════╗
// ║  🔄 DEMO RESET                                                   ║
// ╚════════════════════════════════════════════════════════════════════╝

function resetDemo() {
    SERVICE_TYPES.forEach(st => {
        State.queues[st.prefix][0] = new LinkedListQueue();
        State.queues[st.prefix][1] = new LinkedListQueue();
        State.seq[st.prefix][0] = 0;
        State.seq[st.prefix][1] = 0;
    });
    State.counters = [
        { id: 1, serviceType: 'R', status: 'idle', current: null, calledAt: null, startedAt: null },
        { id: 2, serviceType: 'S', status: 'idle', current: null, calledAt: null, startedAt: null },
        { id: 3, serviceType: 'E', status: 'idle', current: null, calledAt: null, startedAt: null },
        { id: 4, serviceType: 'L', status: 'idle', current: null, calledAt: null, startedAt: null },
    ];
    State.nextCounterId = 5;
    State.lastCalled = null;
    State.lastCalledTime = 0;
    State.flashActive = false;
    State.totalIssued = 0;
    State.totalServed = 0;
    kioskReset();
    renderAll();
}

// ╔════════════════════════════════════════════════════════════════════╗
// ║  🚀 INITIALIZATION                                               ║
// ╚════════════════════════════════════════════════════════════════════╝

function init() {
    renderAll();
    setInterval(updateClock, 1000);
    setInterval(updateElapsedTimers, 1000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
